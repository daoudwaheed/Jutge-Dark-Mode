<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Modern Color Palette */
        :root {
            --bg-gradient: linear-gradient(135deg, #2b2b36, #14141a);
            --text-main: #f0f0f5;
            --text-muted: #8b8b99;
            --toggle-bg-off: #444455;
            --toggle-bg-on: #6366f1; /* A sleek indigo accent */
            --knob-bg: #ffffff;
        }

        body {
            width: 240px;
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none; /* Prevents ugly text highlighting on double clicks */
        }

        /* Header Styling */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .header svg {
            width: 22px;
            height: 22px;
            fill: var(--toggle-bg-on);
        }

        h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Custom Sun/Moon Toggle Container */
        .theme-switch-wrapper {
            cursor: pointer;
        }

        .theme-switch-wrapper input {
            display: none; /* Hide the default ugly checkbox */
        }

        .theme-switch {
            position: relative;
            width: 80px;
            height: 40px;
            background-color: var(--toggle-bg-off);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            box-sizing: border-box;
            transition: background-color 0.4s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
        }

        /* Sun and Moon Icons inside the toggle */
        .theme-switch .icon {
            width: 18px;
            height: 18px;
            z-index: 1;
        }

        /* The sliding knob */
        .theme-switch .knob {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 32px;
            height: 32px;
            background-color: var(--knob-bg);
            border-radius: 50%;
            /* The magic cubic-bezier makes it "bounce" when clicked */
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* When the invisible checkbox is checked, animate the custom toggle! */
        input:checked + .theme-switch {
            background-color: var(--toggle-bg-on);
        }

        input:checked + .theme-switch .knob {
            transform: translateX(40px); /* Move the knob to the right */
        }

        /* Status Text Styling */
        .status {
            margin-top: 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        <h2>Dark Mode Jutge</h2>
    </div>

    <label class="theme-switch-wrapper">
        <input type="checkbox" id="themeToggle">
        <div class="theme-switch">
            <svg class="icon moon" viewBox="0 0 24 24" fill="none" stroke="#a0a0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="icon sun" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            
            <div class="knob"></div>
        </div>
    </label>

    <div class="status" id="statusText">LIGHT MODE</div>

    <script src="js/popup.js"></script>
</body>
</html>
